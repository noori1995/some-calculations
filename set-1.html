    function isNumber(input) {
        if (parseFloat(input) == input)
            return true;
        else {
            alert(`NOT VALID : NOT A NUMBER`)
            return false;
        }
    }
    function isPositive(input) {
        if (parseFloat(input) >= 0)
            return true;
        else {
            alert(`NOT VALID : NOT POSITIVE`)
            return false;
        }
    }
    function isInteger(input) {
        if (parseFloat(input) % 1 == 0)
            return true;
        else {
            alert(`NOT VALID : NOT AN INTEGER`)
            return false;
        }
    }
    function roundIt(input) {
        let roundNumber = parseFloat(input) - parseFloat(input) % 1;
        return roundNumber;
    }
    function isEven(input) {
        if (parseInt(input) % 2 == 0)
            return true;
        else {
            alert(`NOT VALID : NOT AN EVEN NUMBER`)
            return false;
        }
    }
    function isOdd(input) {
        if (parseInt(input) % 2 != 0)
            return true;
        else {
            alert(`NOT VALID : NOT AN ODD NUMBER`)
            return false;
        }
    }
    function positiveNumberCountToZero(input, i = 1) {
        input = parseInt(input);
        let string = " ";
        for (let j = input; j >= 0; j -= i) {
            string = string + j.toString() + "  ";
        }
        return string;
    }
    function factorial(input) {
        input = parseInt(input);
        let sum = 1;
        for (let i = 2; i <= input; i++)
            sum *= i;
        sum = sum.toString();
        return sum;
    }
    function digits(input) {
        let number = 0;
        number = input.length;
        return number;
    }
    function secondsToStandard(input) {
        input = parseInt(input);
        let hours = 0;
        let minutes = 0;
        let seconds = 0;
        while (input >= 3600) {
            input -= 3600;
            hours++;
        }
        while (input >= 60) {
            input -= 60;
            minutes++;
        }
        seconds = input;
        string = "This is " + hours.toString() + " hours and " + minutes.toString() + " minutes and " + seconds + " seconds";
        return string;
    }
    function isPrimeNumber(input) {
        input = parseInt(input);
        let flag = true;
        let string;
        for (let i = 2; i < input; i++)
            if (input % i == 0)
                flag = false;
        flag ? string = `It's a "PRIME NUMBER"` : string = `It's a "COMPOSITE NUMBER"`;
        return string;
    }
    function isPGCQ(input) {
        if (input == `p` || input == `g` || input == `c` || input == `q`)
            return true;

    }
    function isCharacter(input) {
        if (parseFloat(input) == input) {
            alert(`NOT VALID : It's a number`)
            return false;
        }
        else

    }
    function power(input) {
        input = input ** input;
        input = input.toString();
        return input;
    }
    function switchFunction() {
        while (true) {
            let number;
            let command;
            do { command = prompt(`Enter the character \np:power\ng:factorail\nc:Prime Number\nq:quit`).toLowerCase() }
            while ((!isDefined(command) || !isCharacter(command) || !isPGCQ(command)));
            if (command != `q`) {
                do { number = prompt(`Enter the number `) }
                while ((!isNumber(number) || !isPositive(number)) || !isInteger(number));
                number = parseInt(number);
            }
            switch (command) {
                case `p`:
                    alert(power(number));
                    break;
                case `g`:
                    alert(factorial(number));
                    break;
                case `c`:
                    alert(isPrimeNumber(number));
                    break;
                case `q`:
                    alert(`Finished`);
                    return;
                    break;
                default:
                    alert(`error`);
                    break;
            }
        }
    }

    function setAccountNumber() {

        do { theAccountNumber = prompt(`Enter your account number `) }
        while (!isNumber(theAccountNumber) || !isPositive(theAccountNumber) || !isInteger(theAccountNumber) || !is16DigitNumber(theAccountNumber))

    function is16DigitNumber(input) {

    function getAccountDetails(firstname, lastname, accountNumber) {
        if (!isDefined(firstname) || !isDefined(lastname) || !isDefined(accountNumber))
            return `all the parameters should define first !`;
        else
            return `firstname : ${firstname}\nlastname : ${lastname}\naccount number : ${accountNumber}`;
    }
    function isDefined(input) {
        const result = (input !== undefined) ? true : false;
        return result;
    }
    function isSizeOne(input) {
        if (input.length == 1)

    function isSame(first, second) {
        if (first == second) {

    function printLosengeFunction() {
        let number;
        let str = ``;
        let diamond = `*`;
        let space = `-`;
        let spaceInside = `+`;
        let wantEmptyLosenge;
        do { number = prompt(`Enter an odd number `) }
        while ((!isNumber(number) || !isPositive(number)) || (!isInteger(number) || !isDefined(number)) || !isOdd(number));
        const wantACustomLosenge = confirm(`Do you want a custom losenge ?`)
        if (wantACustomLosenge) {
            do { diamond = prompt(`Enter a character for losenge `) }
            while (!isSizeOne(diamond) || !isDefined(diamond));
            do { space = prompt(`Enter a character for free space `) }
            while (!isSizeOne(space) || !isDefined(space) || isSame(diamond, space));
            wantEmptyLosenge = confirm(`Do you want a empty losenge ?`);
        }
        if(wantEmptyLosenge){
            do { spaceInside = prompt(`Enter a character for empty space `) }
            while ((!isSizeOne(spaceInside) || !isDefined(spaceInside)) || isSame(diamond, spaceInside));
        }
        number = parseInt(number);
        const num = (number + 1) / 2;

        for (let line = 0; line < number; ++line) {
            for (let j = 0; j < number; ++j){
                if (wantEmptyLosenge) {
                    if (line < num) {
                        if ((j == num + line - 1) || (j == num - line - 1))
                            str += diamond;
                        else if ((j < num + line - 1) && (j > num - line - 1))
                            str += spaceInside;
                        else
                            str += space;
                    }
                    else {
                        if ((j == number + num - line - 2) || (j == line - num + 1))
                            str += diamond;
                        else if ((j < number + num - line - 2) && (j > line - num + 1))
                            str += spaceInside;
                        else
                            str += space;
                    }
                } 
                else {
                    if (line < num) {
                        if ((j <= num + line - 1) && (j >= num - line - 1))
                            str += diamond;
                        else
                            str += space;
                    }
                    else {
                        if ((j <= number + num - line - 2) && (j >= line - num + 1))
                            str += diamond;
                        else
                            str += space;

                    }
                }
            }
            str += `\n`;
        }
        console.log(str);
        return str;
    }
